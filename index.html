<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx Form</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e8f1ff;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
  animation:moveBg 14s ease-in-out infinite alternate;
}

@keyframes moveBg{
  from{transform:scale(1.1) translateY(0);}
  to{transform:scale(1.15) translateY(-10px);}
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#0a1a3a88,#050814 70%);
  z-index:1;
}

canvas{
  position:fixed;
  inset:0;
  z-index:2;
}

/* ENTRY */
#entry{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  background:rgba(5,8,20,0.9);
  backdrop-filter:blur(10px);
}

.entry-box{
  text-align:center;
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(120,160,255,0.2);
  background:rgba(10,18,40,0.6);
  box-shadow:0 0 40px rgba(0,120,255,0.15);
}

.entry-box img{
  width:120px;
  border-radius:12px;
  margin-bottom:10px;
  filter:drop-shadow(0 0 15px rgba(90,160,255,0.8));
}

.entry-box h2{
  font-size:16px;
  margin-bottom:10px;
}

.entry-btn{
  padding:12px 22px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.entry-btn:active{
  transform:scale(0.96);
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:3;
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:18px;
}

.card{
  width:100%;
  max-width:500px;
  max-height:90vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,120,255,0.12);
}

.header{
  text-align:center;
}

.logo{
  width:85px;
  border-radius:10px;
  filter:drop-shadow(0 0 14px rgba(90,160,255,0.8));
}

h1{font-size:18px;}
.sub{font-size:12px;opacity:0.6;}

label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
  transition:0.2s;
  font-size:13px;
}

input:focus,textarea:focus{
  transform:scale(1.02);
  box-shadow:0 0 0 3px rgba(90,160,255,0.15);
  border-color:rgba(90,160,255,0.6);
}

button.submit{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-box">
    <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
    <h2>Tempest Buxx</h2>
    <button class="entry-btn" onclick="enterSite()">Entrar no formulário</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="startSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a6c8c5.mp3">
</audio>

<audio id="clickSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0a1f5d3c6b.mp3">
</audio>

<!-- MAIN -->
<div class="wrapper" id="main">

  <div class="card">

    <div class="header">
      <img class="logo" src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
      <h1>Tempest Buxx</h1>
      <div class="sub">Staff Application Form</div>
    </div>

    <form>

      <label>Nome</label>
      <input>

      <label>Usuário do Discord</label>
      <input>

      <label>Idade</label>
      <input type="number">

      <label>Tempo no Discord</label>
      <input>

      <label>Já foi staff?</label>
      <textarea rows="2"></textarea>

      <label>Onde?</label>
      <textarea rows="2"></textarea>

      <label>Cargo anterior</label>
      <input>

      <label>Por que saiu?</label>
      <textarea rows="2"></textarea>

      <label>Tempo livre por dia</label>
      <input>

      <label>Como lidaria com conflito?</label>
      <textarea rows="2"></textarea>

      <label>Por que quer entrar?</label>
      <textarea rows="2"></textarea>

      <label>Sobre você</label>
      <textarea rows="3"></textarea>

      <button class="submit" type="button">Enviar candidatura</button>

    </form>

  </div>

</div>

<script>
function enterSite(){
  const s=document.getElementById("startSound");
  s.volume=0.6;
  s.play().catch(()=>{});

  document.getElementById("entry").style.display="none";
  document.getElementById("main").style.display="flex";
}

/* click sound */
const click=document.getElementById("clickSound");
document.querySelectorAll("input,textarea").forEach(el=>{
  el.addEventListener("focus",()=>{
    click.currentTime=0;
    click.play().catch(()=>{});
  });
});

/* particles */
const c=document.getElementById("particles");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.2,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function anim(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="rgba(120,160,255,0.35)";

  p.forEach(e=>{
    x.beginPath();
    x.arc(e.x,e.y,e.r,0,Math.PI*2);
    x.fill();

    e.x+=e.dx;
    e.y+=e.dy;

    if(e.x<0||e.x>c.width)e.dx*=-1;
    if(e.y<0||e.y>c.height)e.dy*=-1;
  });

  requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
