<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx Form</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e8f1ff;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#0a1a3a88,#050814 70%);
  z-index:1;
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:18px;
}

.card{
  width:100%;
  max-width:500px;
  max-height:80vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,120,255,0.12);
}

.header{
  text-align:center;
}

.logo{
  width:85px;
  border-radius:10px;
  filter:drop-shadow(0 0 14px rgba(90,160,255,0.8));
}

h1{font-size:18px;}
.sub{font-size:12px;opacity:0.6;}

label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
}

textarea{resize:none;}

button{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* ===== FINAL CUTSCENE ===== */
#cutscene{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:9999;
  overflow:hidden;
}

/* GIF vindo do fundo */
#cutscene img{
  width:260px;
  border-radius:14px;
  animation:zoomIn 2.5s ease forwards;
  filter:drop-shadow(0 0 30px rgba(80,160,255,0.9));
}

@keyframes zoomIn{
  0%{transform:scale(0.2); opacity:0; filter:blur(10px);}
  40%{opacity:1;}
  100%{transform:scale(1.1); opacity:1;}
}

/* raio azul */
#cutscene::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(80,160,255,0.25), transparent 60%);
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:0.2;}
  50%{opacity:0.6;}
  100%{opacity:0.2;}
}

/* TEXTO FEITO POR ZIG */
.zig{
  position:absolute;
  bottom:18%;
  font-size:14px;
  letter-spacing:3px;
  color:#7fb2ff;
  text-shadow:0 0 10px rgba(80,160,255,0.8);
  animation:zigAnim 2.5s ease forwards;
}

@keyframes zigAnim{
  0%{opacity:0; transform:translateY(10px);}
  20%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0; transform:translateY(-10px);}
}

/* SUCCESS TEXT */
.success{
  position:absolute;
  top:65%;
  font-size:13px;
  opacity:0;
  animation:show 2.5s ease forwards;
  animation-delay:1s;
}

@keyframes show{
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="wrapper">

  <div class="card">

    <div class="header">
      <img class="logo" src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
      <h1>Tempest Buxx</h1>
      <div class="sub">Staff Application</div>
    </div>

    <form id="form">

      <label>Nome</label>
      <input required>

      <label>Discord</label>
      <input required>

      <label>Idade</label>
      <input type="number" required>

      <label>Experiência</label>
      <textarea rows="3"></textarea>

      <button type="submit">Enviar candidatura</button>

    </form>

  </div>

</div>

<!-- CUTSCENE -->
<div id="cutscene">

  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/LOGO.gif">

  <div class="zig">FEITO POR ZIG</div>

  <div class="success">Candidatura enviada com sucesso</div>

</div>

<audio id="snd">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a6c8c5.mp3">
</audio>

<script>
const form=document.getElementById("form");
const cut=document.getElementById("cutscene");
const snd=document.getElementById("snd");

form.addEventListener("submit",(e)=>{
  e.preventDefault();

  snd.volume=0.6;
  snd.play().catch(()=>{});

  cut.style.display="flex";

  setTimeout(()=>{
    cut.style.display="none";
    location.reload();
  },2500);
});
</script>

</body>
</html>
