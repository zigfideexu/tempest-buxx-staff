<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx - Staff</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #070c1a, #050814);
  color: #d6e4ff;
  overflow: hidden;
}

/* partículas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #050814;
  z-index: 10;
  flex-direction: column;
  animation: introOut 1s ease forwards;
  animation-delay: 1.5s;
}

.intro img {
  width: 140px;
  border-radius: 12px;
  filter: drop-shadow(0 0 15px rgba(0,140,255,0.8));
  animation: zoomIn 1s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes introOut {
  to { opacity: 0; visibility: hidden; }
}

/* FORM ENTRADA */
.container {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  opacity: 0;
  animation: show 1s ease forwards;
  animation-delay: 2s;
}

@keyframes show {
  to { opacity: 1; }
}

.card {
  width: 430px;
  background: rgba(10, 18, 40, 0.75);
  border-radius: 18px;
  padding: 22px;
  border: 1px solid rgba(90, 140, 255, 0.25);
  box-shadow: 0 0 25px rgba(0,120,255,0.2);
  backdrop-filter: blur(10px);
}

/* GIF sobe pro topo (efeito transição) */
.logo {
  width: 110px;
  display: block;
  margin: 0 auto;
  animation: moveUp 1.2s ease forwards;
  animation-delay: 1.4s;
  opacity: 0;
}

@keyframes moveUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* título FORMULÁRIO caindo */
.drop-title {
  text-align: center;
  font-size: 18px;
  letter-spacing: 3px;
  color: #8fb6ff;
  animation: drop 1s ease forwards;
  animation-delay: 1.6s;
  opacity: 0;
}

@keyframes drop {
  0% { transform: translateY(-40px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

h1 {
  text-align: center;
  margin: 5px 0;
}

.subtitle {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 10px;
}

/* símbolos */
.symbol {
  color: #4fa3ff;
  margin-right: 6px;
  filter: drop-shadow(0 0 5px rgba(0,120,255,0.5));
}

label {
  font-size: 13px;
  display: flex;
  align-items: center;
  margin-top: 8px;
}

/* inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid rgba(120,170,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  transition: 0.2s;
}

input:focus, textarea:focus {
  transform: scale(1.02);
  box-shadow: 0 0 12px rgba(0,140,255,0.3);
}

/* botão */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #1a5cff, #2f7bff);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO -->
<div class="intro">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
</div>

<!-- FORM -->
<div class="container">
  <div class="card">

    <img class="logo"
      src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">

    <div class="drop-title">FORMULÁRIO</div>

    <h1>Tempest Buxx</h1>
    <p class="subtitle">Candidatura para Staff</p>

    <form>

      <label><span class="symbol">💠</span>Qual seu nome?</label>
      <input type="text">

      <label><span class="symbol">💠</span>Qual seu Discord?</label>
      <input type="text">

      <label><span class="symbol">❓</span>Qual sua idade?</label>
      <input type="number">

      <label><span class="symbol">💠</span>Experiência no Discord?</label>
      <textarea rows="2"></textarea>

      <label><span class="symbol">❓</span>Já foi staff?</label>
      <textarea rows="2"></textarea>

      <label><span class="symbol">💠</span>Por que quer entrar?</label>
      <textarea rows="2"></textarea>

      <button type="submit">Enviar</button>

    </form>

  </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(120,170,255,0.5)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
