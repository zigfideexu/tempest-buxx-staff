<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx Form</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e8f1ff;
}

.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#0a1a3a88,#050814 70%);
  z-index:1;
}

#entry{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

.entry-box img{
  width:150px;
  filter:drop-shadow(0 0 25px rgba(80,160,255,0.9));
}

.entry-box button{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.wrapper{
  display:none;
  position:relative;
  z-index:3;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
  padding:15px;
}

.card{
  width:100%;
  max-width:520px;
  max-height:75vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
}

.form-title{
  text-align:center;
  margin:10px 0;
  color:#7fb2ff;
  font-size:14px;
  letter-spacing:2px;
}

label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
}

button.submit{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

#cutscene{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:99999;
  flex-direction:column;
}

#cutscene img{
  width:220px;
}

.zig{
  margin-top:15px;
  color:#7fb2ff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div id="entry">
  <div class="entry-box">
    <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
    <br>
    <button onclick="enter()">Entrar</button>
  </div>
</div>

<div class="wrapper" id="main">

  <div class="card">

    <div class="form-title">FORMULÁRIO DE CANDIDATURA</div>

    <form id="form">

      <label>Nome</label>
      <input required>

      <label>Discord</label>
      <input required>

      <label>Idade</label>
      <input type="number" required>

      <label>Tempo no Discord</label>
      <input>

      <label>Você já trabalhou como staff antes?</label>
      <textarea></textarea>

      <label>Em quais servidores você já atuou?</label>
      <textarea></textarea>

      <label>Qual era seu cargo anterior?</label>
      <input>

      <label>Por que você saiu do cargo de staff?</label>
      <textarea></textarea>

      <label>Por que você saiu do servidor?</label>
      <textarea></textarea>

      <label>Quanto tempo livre você tem por dia?</label>
      <input>

      <label>Como você lidaria com um cliente irritado?</label>
      <textarea></textarea>

      <label>Por que você quer entrar na Tempest Buxx?</label>
      <textarea></textarea>

      <label>O que você faria para ajudar a loja a crescer?</label>
      <textarea></textarea>

      <label>Conte um pouco sobre você</label>
      <textarea></textarea>

      <button class="submit" type="submit">Enviar candidatura</button>

    </form>

  </div>

</div>

<div id="cutscene">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/LOGO.gif">
  <div class="zig">ENVIADO COM SUCESSO</div>
</div>

<script>
function enter(){
  document.getElementById("entry").style.display="none";
  document.getElementById("main").style.display="flex";
}

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const webhookURL = "COLE_SUA_WEBHOOK_AQUI";

  const formData = {
    nome: document.querySelectorAll("input")[0].value,
    discord: document.querySelectorAll("input")[1].value,
    idade: document.querySelectorAll("input")[2].value,
    tempo: document.querySelectorAll("input")[3].value,
    cargo: document.querySelectorAll("input")[4].value,
    livre: document.querySelectorAll("input")[5].value,

    staff: document.querySelectorAll("textarea")[0].value,
    servidores: document.querySelectorAll("textarea")[1].value,
    saiuStaff: document.querySelectorAll("textarea")[2].value,
    saiuServer: document.querySelectorAll("textarea")[3].value,
    irritado: document.querySelectorAll("textarea")[4].value,
    entrar: document.querySelectorAll("textarea")[5].value,
    crescer: document.querySelectorAll("textarea")[6].value,
    sobre: document.querySelectorAll("textarea")[7].value,
  };

  await fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:"📩 Nova candidatura",
      embeds:[{
        title:"Tempest Buxx",
        color:0x4da3ff,
        fields:[
          {name:"Nome",value:formData.nome},
          {name:"Discord",value:formData.discord},
          {name:"Idade",value:formData.idade},
          {name:"Tempo",value:formData.tempo},
          {name:"Cargo",value:formData.cargo},
          {name:"Livre",value:formData.livre},
          {name:"Experiência Staff",value:formData.staff},
          {name:"Servidores",value:formData.servidores},
          {name:"Saiu Staff",value:formData.saiuStaff},
          {name:"Saiu Server",value:formData.saiuServer},
          {name:"Cliente irritado",value:formData.irritado},
          {name:"Entrar",value:formData.entrar},
          {name:"Crescer",value:formData.crescer},
          {name:"Sobre",value:formData.sobre},
        ]
      }]
    })
  });

  document.getElementById("cutscene").style.display="flex";
  setTimeout(()=>location.reload(),2500);
});
</script>

</body>
</html>
