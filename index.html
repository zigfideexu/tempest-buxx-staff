<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx - Staff</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #070c1a, #050814);
  color: #d6e4ff;
  overflow: hidden;
}

/* partículas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* tela de entrada */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #050814;
  z-index: 5;
  flex-direction: column;
  animation: fadeOut 1s ease forwards;
  animation-delay: 1.2s;
}

.intro img {
  width: 140px;
  border-radius: 12px;
  filter: drop-shadow(0 0 15px rgba(0,140,255,0.8));
  animation: zoomIn 1s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* conteúdo */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  opacity: 0;
  animation: showForm 0.8s ease forwards;
  animation-delay: 1.4s;
}

@keyframes showForm {
  to { opacity: 1; }
}

.card {
  width: 420px;
  background: rgba(10, 18, 40, 0.72);
  border: 1px solid rgba(90, 140, 255, 0.25);
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 0 25px rgba(0,120,255,0.15);
  backdrop-filter: blur(10px);
}

h1 {
  text-align: center;
  margin: 5px 0;
}

.subtitle {
  text-align: center;
  opacity: 0.7;
  margin-bottom: 15px;
}

label {
  font-size: 13px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 6px 0 12px;
  border-radius: 10px;
  border: 1px solid rgba(120,170,255,0.2);
  background: rgba(255,255,255,0.06);
  color: white;
  transition: 0.2s;
}

input:focus, textarea:focus {
  transform: scale(1.02);
  box-shadow: 0 0 12px rgba(0,140,255,0.3);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #1a5cff, #2f7bff);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO ANIMATION -->
<div class="intro">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
</div>

<!-- FORM -->
<div class="container">
  <div class="card">

    <h1>Tempest Buxx</h1>
    <p class="subtitle">Candidatura para Staff</p>

    <form>

      <label>Nome</label>
      <input type="text" required>

      <label>Discord</label>
      <input type="text" required>

      <label>Idade</label>
      <input type="number" required>

      <label>Experiência</label>
      <textarea rows="3"></textarea>

      <label>Por que entrar?</label>
      <textarea rows="3"></textarea>

      <button type="submit">Enviar</button>

    </form>

  </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 55; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(120,170,255,0.5)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
