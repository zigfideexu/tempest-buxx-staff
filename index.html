<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempest Buxx - Staff</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050814;
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 420px;
      background: rgba(10, 18, 40, 0.78);
      border: 1px solid rgba(80, 140, 255, 0.35);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 0 25px rgba(0,120,255,0.15);
      backdrop-filter: blur(6px);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      color: #cfe3ff;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    .logo {
      display: block;
      margin: 0 auto 10px;
      width: 140px;
      filter: drop-shadow(0 0 12px rgba(0,140,255,0.7));
    }

    label {
      font-size: 13px;
      opacity: 0.85;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #1a5cff;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3477ff;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="card">

    <!-- LOGO GIF -->
    <img class="logo"
      src="https://cdn.discordapp.com/attachments/1511893405075243122/1513067808819511376/20260601_214159.gif">

    <h1>Tempest Buxx</h1>
    <p class="subtitle">Candidatura para Staff</p>

    <form id="staffForm">

      <label>Qual seu nome?</label>
      <input type="text" required>

      <label>Qual seu usuário do Discord?</label>
      <input type="text" required>

      <label>Qual sua idade?</label>
      <input type="number" required>

      <label>Há quanto tempo usa Discord?</label>
      <input type="text">

      <label>Já trabalhou como staff antes?</label>
      <textarea rows="3"></textarea>

      <label>Se sim, em quais servidores?</label>
      <textarea rows="3"></textarea>

      <label>Qual era o seu cargo?</label>
      <input type="text">

      <label>Por que você deixou de ser staff?</label>
      <textarea rows="3"></textarea>

      <label>Por que você saiu do servidor?</label>
      <textarea rows="3"></textarea>

      <label>Quanto tempo livre você tem por dia?</label>
      <input type="text">

      <label>Como você lidaria com um cliente irritado?</label>
      <textarea rows="3"></textarea>

      <label>Por que quer entrar para a Tempest Buxx?</label>
      <textarea rows="3"></textarea>

      <label>O que você faria para ajudar a loja a crescer?</label>
      <textarea rows="3"></textarea>

      <label>Conte um pouco sobre você.</label>
      <textarea rows="4"></textarea>

      <button type="submit">Enviar</button>

    </form>

  </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.6,
    dy: (Math.random() - 0.5) * 0.6
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(80,140,255,0.6)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
