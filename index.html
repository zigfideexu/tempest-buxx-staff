<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx - Staff</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e6f0ff;
}

/* BACKGROUND GIF */
.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
  animation:moveBg 12s ease-in-out infinite alternate;
}

@keyframes moveBg{
  from{transform:scale(1.1) translateY(0);}
  to{transform:scale(1.15) translateY(-10px);}
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,rgba(0,120,255,0.15),#050814 70%);
  z-index:1;
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:2;
}

/* SOUND */
audio{display:none;}

/* CONTAINER */
.wrapper{
  position:relative;
  z-index:3;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CARD */
.card{
  width:100%;
  max-width:460px;
  max-height:90vh;
  overflow-y:auto;
  background:rgba(10,18,35,0.75);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,120,255,0.12);
}

/* HEADER */
.header{
  text-align:center;
}

.logo{
  width:85px;
  border-radius:10px;
  filter:drop-shadow(0 0 12px rgba(80,150,255,0.8));
}

h1{
  font-size:18px;
  margin-top:5px;
}

.sub{
  font-size:12px;
  opacity:0.6;
}

/* TITLE DROP */
.drop{
  text-align:center;
  margin:10px 0;
  font-size:12px;
  letter-spacing:4px;
  color:#7fb2ff;
  animation:drop 1s ease forwards;
  opacity:0;
  animation-delay:1.2s;
}

@keyframes drop{
  from{transform:translateY(-20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LABEL */
label{
  display:block;
  margin-top:12px;
  font-size:12px;
  opacity:0.9;
}

/* INPUT */
input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.2);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
  transition:0.2s;
  font-size:13px;
}

input:focus,textarea:focus{
  transform:scale(1.02);
  box-shadow:0 0 0 3px rgba(80,150,255,0.15);
  border-color:rgba(80,150,255,0.6);
}

/* BUTTON */
button{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:active{
  transform:scale(0.97);
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050814;
  z-index:10;
  animation:fadeOut 1.2s ease forwards;
  animation-delay:1.4s;
}

.intro img{
  width:140px;
  filter:drop-shadow(0 0 18px rgba(80,150,255,0.8));
  animation:zoom 1s ease;
}

@keyframes zoom{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<canvas id="particles"></canvas>

<!-- SOUND -->
<audio id="clickSound" src="https://www.myinstants.com/media/sounds/mouse-click.mp3"></audio>

<!-- INTRO -->
<div class="intro">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
</div>

<!-- MAIN -->
<div class="wrapper">
  <div class="card">

    <div class="header">
      <img class="logo" src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
      <h1>Tempest Buxx</h1>
      <div class="sub">Staff Application</div>
    </div>

    <div class="drop">FORMULÁRIO</div>

    <form>

      <label>Nome</label>
      <input>

      <label>Discord</label>
      <input>

      <label>Idade</label>
      <input type="number">

      <label>Experiência no Discord</label>
      <textarea rows="2"></textarea>

      <label>Já foi staff?</label>
      <textarea rows="2"></textarea>

      <label>Por que quer entrar?</label>
      <textarea rows="2"></textarea>

      <label>Sobre você</label>
      <textarea rows="3"></textarea>

      <button>Enviar candidatura</button>

    </form>

  </div>
</div>

<script>
/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.2,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(120,160,255,0.35)";

  p.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();

    e.x+=e.dx;
    e.y+=e.dy;

    if(e.x<0||e.x>canvas.width)e.dx*=-1;
    if(e.y<0||e.y>canvas.height)e.dy*=-1;
  });

  requestAnimationFrame(anim);
}
anim();

/* CLICK SOUND (mobile safe) */
const sound=document.getElementById("clickSound");
document.querySelectorAll("input,textarea").forEach(el=>{
  el.addEventListener("focus",()=>{
    sound.currentTime=0;
    sound.play().catch(()=>{});
  });
});
</script>

</body>
</html>
