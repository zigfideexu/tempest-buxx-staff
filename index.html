<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx Form</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e8f1ff;
}

.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#0a1a3a88,#050814 70%);
  z-index:1;
}

/* ENTRY */
#entry{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

.entry-box{
  text-align:center;
}

.entry-box img{
  width:150px;
  filter:drop-shadow(0 0 25px rgba(80,160,255,0.9));
}

.entry-box button{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:3;
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:18px;
}

.card{
  width:100%;
  max-width:520px;
  max-height:72vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
}

.form-header{
  text-align:center;
  margin-bottom:10px;
}

.form-header img{
  width:90px;
  filter:drop-shadow(0 0 20px rgba(80,160,255,0.9));
}

/* 🔵 TÍTULO ADICIONADO (SÓ ISSO NOVO) */
.form-title{
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  font-size:14px;
  letter-spacing:2px;
  color:#7fb2ff;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(80,160,255,0.4);
}

/* INPUTS */
label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
}

input:focus, textarea:focus{
  border-color:#4da3ff;
  box-shadow:0 0 12px rgba(77,160,255,0.45);
}

/* BOTÃO */
button.submit{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* PEZINHO */
.benefits-footer{
  display:flex;
  gap:10px;
  width:100%;
  max-width:520px;
}

.benefit{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:rgba(10,18,40,0.6);
  border:1px solid rgba(120,160,255,0.18);
  font-size:11px;
}

.benefit h3{
  color:#7fb2ff;
  font-size:12px;
  margin-bottom:4px;
}

/* CUTSCENE */
#cutscene{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:99999;
  flex-direction:column;
}

#cutscene img{
  width:240px;
  filter:drop-shadow(0 0 25px rgba(80,160,255,0.9));
}

.zig{
  margin-top:20px;
  font-size:14px;
  color:#7fb2ff;
  letter-spacing:3px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-box">
    <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
    <br>
    <button onclick="enter()">Entrar</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrapper" id="main">

  <div class="card">

    <div class="form-header">
      <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
    </div>

    <!-- 🔵 SÓ ISSO FOI ADICIONADO -->
    <div class="form-title">FORMULÁRIO DE CANDIDATURA</div>

    <form id="form">

      <label>Nome</label>
      <input required>

      <label>Usuário do Discord</label>
      <input required>

      <label>Idade</label>
      <input type="number" required>

      <label>Tempo de uso do Discord</label>
      <input>

      <label>Você já trabalhou como staff antes?</label>
      <textarea></textarea>

      <label>Em quais servidores você já atuou?</label>
      <textarea></textarea>

      <label>Qual era seu cargo anterior?</label>
      <input>

      <label>Por que você saiu do cargo de staff?</label>
      <textarea></textarea>

      <label>Por que você saiu do servidor?</label>
      <textarea></textarea>

      <label>Quanto tempo livre você tem por dia?</label>
      <input>

      <label>Como você lidaria com um cliente irritado?</label>
      <textarea></textarea>

      <label>Por que você quer entrar na Tempest Buxx?</label>
      <textarea></textarea>

      <label>O que você faria para ajudar a loja a crescer?</label>
      <textarea></textarea>

      <label>Conte um pouco sobre você</label>
      <textarea></textarea>

      <button class="submit" type="submit">Enviar candidatura</button>

    </form>

  </div>

  <div class="benefits-footer">
    <div class="benefit">
      <h3>Ambiente</h3>
      Equipe organizada.
    </div>

    <div class="benefit">
      <h3>Benefícios</h3>
      Comissões exclusivas.
    </div>

    <div class="benefit">
      <h3>Crescimento</h3>
      Evolução constante.
    </div>
  </div>

</div>

<!-- CUTSCENE -->
<div id="cutscene">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/LOGO.gif">
  <div class="zig">FEITO POR ZIG</div>
</div>

<script>
function enter(){
  document.getElementById("entry").style.display="none";
  document.getElementById("main").style.display="flex";
}

document.getElementById("form").addEventListener("submit",(e)=>{
  e.preventDefault();
  document.getElementById("cutscene").style.display="flex";

  setTimeout(()=>{
    location.reload();
  },2500);
});
</script>

</body>
</html>
