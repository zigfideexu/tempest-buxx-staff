*{

body{

  overflow:hidden;
  color:#e8f1ff;
}

.bg{
  position:fixed;

  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#0a1a3a88,#050814 70%);
  z-index:1;
}

/* ENTRY */
#entry{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

.entry-box{
  text-align:center;
}

.entry-box img{
  width:150px;
  filter:drop-shadow(0 0 25px rgba(80,160,255,0.9));
}

.entry-box button{
  margin-top:12px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:3;
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:18px;
}

.card{
  width:100%;
  max-width:520px;
  max-height:72vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
}

.form-header{
  text-align:center;
  margin-bottom:10px;
}

.form-header img{
  width:90px;
  filter:drop-shadow(0 0 20px rgba(80,160,255,0.9));
}

/* 🔵 TÍTULO ADICIONADO (SÓ ISSO NOVO) */
.form-title{
  text-align:center;
  margin-top:10px;
  margin-bottom:10px;
  font-size:14px;
  letter-spacing:2px;
  color:#7fb2ff;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(80,160,255,0.4);
}

/* INPUTS */
label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
}

input:focus, textarea:focus{
  border-color:#4da3ff;
  box-shadow:0 0 12px rgba(77,160,255,0.45);
}

/* BOTÃO */
button.submit{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

  max-width:520px;
}
