<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempest Buxx - Staff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Tempest Buxx</h1>
      <p class="subtitle">Candidatura para Staff</p>

      <form id="staffForm">

        <label>Qual seu nome?</label>
        <input type="text" required>

        <label>Qual seu usuário do Discord?</label>
        <input type="text" required>

        <label>Qual sua idade?</label>
        <input type="number" required>

        <label>Há quanto tempo usa Discord?</label>
        <input type="text">

        <label>Já trabalhou como staff antes?</label>
        <textarea rows="3"></textarea>

        <label>Se sim, em quais servidores?</label>
        <textarea rows="3"></textarea>

        <label>Qual era o seu cargo?</label>
        <input type="text">

        <label>Por que você deixou de ser staff?</label>
        <textarea rows="3"></textarea>

        <label>Por que você saiu do servidor?</label>
        <textarea rows="3"></textarea>

        <label>Quanto tempo livre você tem por dia?</label>
        <input type="text">

        <label>Como você lidaria com um cliente irritado?</label>
        <textarea rows="4"></textarea>

        <label>Por que quer entrar para a Tempest Buxx?</label>
        <textarea rows="4"></textarea>

        <label>O que você faria para ajudar a loja a crescer?</label>
        <textarea rows="4"></textarea>

        <label>Conte um pouco sobre você.</label>
        <textarea rows="5"></textarea>

        <button type="submit">Enviar Candidatura</button>

      </form>
    </div>
  </div>
