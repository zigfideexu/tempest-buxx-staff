
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempest Buxx - Staff</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #07102a, #050814);
      color: #d6e4ff;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 25px;
    }

    .card {
      width: 460px;
      background: rgba(10, 18, 40, 0.75);
      border: 1px solid rgba(80, 140, 255, 0.35);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(0,120,255,0.25);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    /* decoração azul lateral */
    .card::before {
      content: "✦ ✧ ✦";
      position: absolute;
      top: 10px;
      right: 15px;
      color: rgba(120,170,255,0.4);
      font-size: 14px;
    }

    .banner {
      width: 100%;
      height: 120px;
      background: linear-gradient(90deg, rgba(0,120,255,0.2), rgba(0,60,150,0.1));
      border-radius: 14px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      color: #bcd7ff;
      box-shadow: inset 0 0 20px rgba(0,120,255,0.2);
    }

    .logo {
      display: block;
      margin: 10px auto;
      width: 130px;
      border-radius: 14px;
      filter: drop-shadow(0 0 14px rgba(0,140,255,0.8));
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 20px rgba(0,170,255,1));
    }

    h1 {
      text-align: center;
      margin: 5px 0;
      color: #cfe3ff;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      opacity: 0.9;
    }

    input, textarea {
      width: 100%;
      padding: 9px;
      margin: 6px 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(120,170,255,0.2);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border: 1px solid rgba(120,170,255,0.6);
      box-shadow: 0 0 10px rgba(0,120,255,0.2);
    }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #1a5cff, #3477ff);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(0,120,255,0.4);
    }

    .symbols {
      text-align: center;
      margin: 10px 0;
      color: rgba(120,170,255,0.6);
      letter-spacing: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="card">

    <!-- BANNER GRANDE -->
    <div class="banner">✦ TEMPEST BUXX STAFF PANEL ✦</div>

    <!-- LOGO -->
    <img class="logo"
      src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">

    <div class="symbols">✦ ✧ ✦ ✧ ✦</div>

    <h1>Tempest Buxx</h1>
    <p class="subtitle">Candidatura para Staff</p>

    <form>

      <label>Qual seu nome?</label>
      <input type="text" required>

      <label>Qual seu usuário do Discord?</label>
      <input type="text" required>

      <label>Qual sua idade?</label>
      <input type="number" required>

      <label>Há quanto tempo usa Discord?</label>
      <input type="text">

      <label>Já trabalhou como staff antes?</label>
      <textarea rows="3"></textarea>

      <label>Se sim, em quais servidores?</label>
      <textarea rows="3"></textarea>

      <label>Por que quer entrar na Tempest Buxx?</label>
      <textarea rows="3"></textarea>

      <label>O que você faria para ajudar a loja?</label>
      <textarea rows="3"></textarea>

      <button type="submit">Enviar Candidatura</button>

    </form>

  </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 70; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.6,
    dy: (Math.random() - 0.5) * 0.6
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "rgba(120,170,255,0.6)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
