<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempest Buxx Form</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Plus Jakarta Sans",sans-serif;
}

body{
  background:#050814;
  overflow:hidden;
  color:#e8f1ff;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif") center/cover no-repeat;
  filter:blur(18px) brightness(0.35);
  transform:scale(1.1);
  z-index:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#0a1a3a88,#050814 70%);
  z-index:1;
}

/* ENTRY */
#entry{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

.entry-box{
  text-align:center;
  padding:25px;
  border-radius:16px;
  background:rgba(10,18,40,0.7);
  border:1px solid rgba(120,160,255,0.2);
}

.entry-box img{
  width:120px;
  border-radius:12px;
  margin-bottom:10px;
}

.entry-box button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* MAIN */
.wrapper{
  position:relative;
  z-index:3;
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  padding:18px;
}

.card{
  width:100%;
  max-width:520px;
  max-height:72vh;
  overflow-y:auto;
  background:rgba(10,18,40,0.72);
  border:1px solid rgba(120,160,255,0.18);
  border-radius:18px;
  padding:20px;
  backdrop-filter:blur(14px);
}

/* FORM */
label{
  display:block;
  margin-top:12px;
  font-size:12px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:11px;
  border-radius:10px;
  border:1px solid rgba(120,160,255,0.18);
  background:rgba(255,255,255,0.04);
  color:white;
}

button.submit{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f7bff,#4da3ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* PEZINHO */
.benefits-footer{
  display:flex;
  gap:10px;
  width:100%;
  max-width:520px;
}

.benefit{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:rgba(10,18,40,0.6);
  border:1px solid rgba(120,160,255,0.18);
  font-size:11px;
}

.benefit h3{color:#7fb2ff;font-size:12px;margin-bottom:4px;}

/* LOGO CANTO */
.corner-logo{
  position:fixed;
  bottom:10px;
  right:10px;
  width:55px;
  opacity:0.7;
  z-index:10;
}

/* CUTSCENE */
#cutscene{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.92);
  z-index:99999;
  flex-direction:column;
}

#cutscene img{
  width:240px;
  animation:zoom 2.5s ease forwards;
  filter:drop-shadow(0 0 25px rgba(80,160,255,0.9));
}

@keyframes zoom{
  0%{transform:scale(0.2);opacity:0;}
  50%{opacity:1;}
  100%{transform:scale(1.1);opacity:1;}
}

.zig{
  margin-top:20px;
  font-size:14px;
  color:#7fb2ff;
  letter-spacing:3px;
  text-shadow:0 0 12px rgba(80,160,255,0.9);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- ENTRY -->
<div id="entry">
  <div class="entry-box">
    <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">
    <button onclick="enter()">Entrar</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrapper" id="main">

  <div class="card">

    <form id="form">

      <label>Nome</label><input required>
      <label>Usuário do Discord</label><input required>
      <label>Idade</label><input type="number" required>

      <label>Há quanto tempo usa Discord?</label>
      <input>

      <label>Já trabalhou como staff antes?</label>
      <textarea rows="3"></textarea>

      <label>Se sim, em quais servidores?</label>
      <textarea rows="3"></textarea>

      <label>Qual era seu cargo?</label>
      <input>

      <label>Por que deixou de ser staff?</label>
      <textarea rows="3"></textarea>

      <label>Por que saiu do servidor?</label>
      <textarea rows="3"></textarea>

      <label>Tempo livre por dia</label>
      <input>

      <label>Como lidaria com cliente irritado?</label>
      <textarea rows="3"></textarea>

      <label>Por que quer entrar na Tempest Buxx?</label>
      <textarea rows="3"></textarea>

      <label>O que faria para ajudar a loja?</label>
      <textarea rows="3"></textarea>

      <label>Fale sobre você</label>
      <textarea rows="4"></textarea>

      <button class="submit" type="submit">Enviar candidatura</button>

    </form>

  </div>

  <!-- PEZINHO -->
  <div class="benefits-footer">
    <div class="benefit">
      <h3>Ambiente</h3>
      Organização e equipe.
    </div>

    <div class="benefit">
      <h3>Benefícios</h3>
      Comissões exclusivas.
    </div>

    <div class="benefit">
      <h3>Crescimento</h3>
      Evolução constante.
    </div>
  </div>

</div>

<!-- LOGO -->
<img class="corner-logo" src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/20260527_222655.gif">

<!-- CUTSCENE -->
<div id="cutscene">
  <img src="https://raw.githubusercontent.com/zigfideexu/tempest-buxx-staff/refs/heads/main/LOGO.gif">
  <div class="zig">FEITO POR ZIG</div>
</div>

<!-- SONS CORRIGIDOS -->
<audio id="startSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a6c8c5.mp3"></audio>
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0a1f5d3c6b.mp3"></audio>

<script>
let unlocked=false;

const startSound=document.getElementById("startSound");
const clickSound=document.getElementById("clickSound");

function unlockAudio(){
  const t=new Audio(startSound.src);
  t.volume=0;
  t.play().then(()=>{unlocked=true;}).catch(()=>{});
}

function play(a){
  if(!unlocked) return;
  a.currentTime=0;
  a.volume=0.6;
  a.play().catch(()=>{});
}

function enter(){
  unlockAudio();
  play(startSound);

  document.getElementById("entry").style.display="none";
  document.getElementById("main").style.display="flex";
}

document.getElementById("form").addEventListener("submit",(e)=>{
  e.preventDefault();

  play(clickSound);

  document.getElementById("cutscene").style.display="flex";

  setTimeout(()=>{
    location.reload();
  },2500);
});
</script>

</body>
</html>
